<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字遊戲 — 教師端</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3350; --accent: #5b8dee; --accent2: #f7c948;
    --green: #4ecb71; --red: #ff6b6b; --text: #e8eaf6;
    --muted: #8890b0; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1a2040 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px; display: flex; align-items: center; gap: 16px;
  }
  header .logo {
    font-family: 'Nunito', sans-serif; font-size: 1.6rem; font-weight: 900;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header .badge {
    background: rgba(91,141,238,0.15); border: 1px solid var(--accent);
    color: var(--accent); font-size: 0.72rem; font-weight: 700;
    padding: 3px 10px; border-radius: 20px; letter-spacing: 1px;
  }
  .container { max-width: 1140px; margin: 0 auto; padding: 32px 24px; }
  h2 {
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 800;
    color: var(--accent2); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 24px; }
  .step {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85rem; flex-shrink: 0;
  }
  .info-banner {
    background: rgba(91,141,238,0.08); border: 1px solid rgba(91,141,238,0.25);
    border-radius: 10px; padding: 12px 18px; font-size: 0.84rem; color: var(--muted);
    margin-bottom: 20px; line-height: 1.7;
  }
  .info-banner b { color: var(--accent); }

  /* Loading */
  .loading {
    display: flex; align-items: center; gap: 12px;
    color: var(--muted); font-size: 0.9rem; padding: 20px 0;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Topic filter */
  .topic-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .topic-chip {
    padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    font-size: 0.82rem; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; user-select: none;
  }
  .topic-chip:hover { border-color: var(--accent); color: var(--text); }
  .topic-chip.active { background: rgba(91,141,238,0.18); border-color: var(--accent); color: var(--accent); font-weight: 700; }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .btn {
    padding: 8px 18px; border-radius: 9px; border: none; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; font-size: 0.86rem; font-weight: 700; transition: all 0.18s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a7de0; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(255,107,107,0.12); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }
  .btn-gold { background: var(--accent2); color: #1a1200; }
  .btn-gold:hover { background: #e8b830; transform: translateY(-1px); }
  .count-badge {
    font-size: 0.82rem; background: rgba(78,203,113,0.15); border: 1px solid var(--green);
    color: var(--green); padding: 4px 12px; border-radius: 20px; font-weight: 700;
  }
  .count-badge.over { background: rgba(255,107,107,0.15); border-color: var(--red); color: var(--red); }

  /* Word grid */
  .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; }
  .word-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 12px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .word-item:hover { border-color: var(--accent); }
  .word-item.selected { border-color: var(--green); background: rgba(78,203,113,0.08); }
  .word-item input[type="checkbox"] { accent-color: var(--green); width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
  .word-en { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--text); }
  .word-zh { font-size: 0.76rem; color: var(--muted); margin-top: 1px; }
  .word-topic { font-size: 0.7rem; color: rgba(91,141,238,0.6); margin-top: 1px; }

  /* Link box */
  .link-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; font-family: monospace; font-size: 0.82rem; color: var(--accent);
    word-break: break-all; margin-top: 14px; display: none;
  }
  .copy-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
  .copy-ok { color: var(--green); font-size: 0.82rem; display: none; }

  /* Preview table */
  .preview-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.86rem; }
  .preview-table th { background: var(--surface2); color: var(--accent2); padding: 7px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 700; }
  .preview-table td { padding: 7px 12px; border-bottom: 1px solid rgba(46,51,80,0.4); color: var(--text); }
  .preview-table tr:hover td { background: rgba(91,141,238,0.04); }
  .empty { text-align: center; color: var(--muted); padding: 30px; font-size: 0.88rem; }

  /* Search */
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
  .search-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 0.88rem;
    padding: 9px 14px; outline: none; transition: border 0.2s; max-width: 320px;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-count { font-size: 0.8rem; color: var(--muted); }

  /* Error */
  .error-msg { color: var(--red); font-size: 0.88rem; padding: 12px 0; }
</style>
</head>
<body>
<header>
  <div class="logo">✦ WordQuest</div>
  <div class="badge">TEACHER</div>
</header>
<div class="container">

  <div class="info-banner">
    <b>使用說明：</b>
    Step 1 — 用主題篩選或搜尋單字　▸　Step 2 — 手動勾選或隨機挑選 20 個　▸　Step 3 — 產生學生連結並複製傳送
  </div>

  <!-- STEP 1: Filter -->
  <div class="card">
    <h2><span class="step">1</span> 篩選單字 <span id="totalCount" style="font-size:0.85rem;color:var(--muted);font-weight:400;"></span></h2>
    <div id="loadingMsg" class="loading"><div class="spinner"></div>載入單字庫中...</div>
    <div id="filterArea" style="display:none;">
      <div class="topic-filter" id="topicFilter"></div>
      <div class="search-row">
        <input class="search-input" id="searchInput" placeholder="🔍 搜尋英文或中文..." oninput="filterWords()">
        <span class="filter-count" id="filterCount"></span>
      </div>
    </div>
    <div id="loadError" class="error-msg" style="display:none;">⚠️ 無法載入單字庫，請確認 words.json 與此檔案在同一資料夾。</div>
  </div>

  <!-- STEP 2: Select -->
  <div class="card" id="selectCard" style="display:none;">
    <h2><span class="step">2</span> 選擇 20 個單字</h2>
    <div class="controls">
      <button class="btn btn-primary" onclick="randomPick()">🎲 從目前篩選中隨機挑 20 個</button>
      <button class="btn btn-secondary" onclick="clearAll()">✕ 清除選取</button>
      <span id="countBadge" class="count-badge">已選 0 / 20</span>
    </div>
    <div id="wordGrid" class="word-grid"></div>
  </div>

  <!-- STEP 3: Generate -->
  <div class="card" id="generateCard" style="display:none;">
    <h2><span class="step">3</span> 產生學生連結</h2>
    <p style="font-size:0.86rem;color:var(--muted);margin-bottom:12px;">請先選取恰好 <b style="color:var(--green)">20 個</b>單字</p>
    <div id="selectedPreview"></div>
    <button class="btn btn-gold" onclick="generateLink()" style="margin-top:12px;">🔗 產生學生連結</button>
    <div id="linkBox" class="link-box"></div>
    <div class="copy-row" id="copyRow" style="display:none;">
      <button class="btn btn-secondary" onclick="copyLink()">📋 複製連結</button>
      <span id="copyOk" class="copy-ok">✓ 已複製！</span>
    </div>
  </div>

</div>

<script>
const ALL_TOPICS = ["人物", "家庭", "職業", "稱謂的形式", "個人特質／事物外觀", "身體部位", "健康", "數量", "尺寸與測量", "時間", "金錢", "食物和飲料", "餐具", "衣服和裝飾品", "運動、興趣與嗜好", "房子與公寓", "學校", "地方與位置", "運輸", "國家與區域", "節日與慶典", "天氣與大自然", "地理名詞", "動物與昆蟲", "代名詞", "介系詞", "連接詞", "其他名詞", "其他動詞", "其他形容詞", "其他副詞"];

let WORD_DB = [];
let selected = new Set();
let filteredIndices = [];
let activeTopic = null;

// ── Load words.json ──────────────────────────────────────
async function loadWordDB() {
  try {
    const base = window.location.href.replace(/teacher\.html.*$/, '').replace(/\?.*$/, '');
    const res = await fetch(base + 'words.json');
    if (!res.ok) throw new Error('fetch failed');
    WORD_DB = await res.json();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('filterArea').style.display = 'block';
    document.getElementById('totalCount').textContent = `（共 ${WORD_DB.length} 字）`;
    document.getElementById('selectCard').style.display = 'block';
    document.getElementById('generateCard').style.display = 'block';
    buildTopicFilter();
    filterWords();
  } catch(e) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('loadError').style.display = 'block';
  }
}

// ── Topic chips ──────────────────────────────────────────
function buildTopicFilter() {
  const div = document.getElementById('topicFilter');
  div.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'topic-chip active'; all.textContent = '全部';
  all.onclick = () => setTopic(null, all);
  div.appendChild(all);
  ALL_TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-chip'; btn.textContent = t;
    btn.onclick = () => setTopic(t, btn);
    div.appendChild(btn);
  });
}

function setTopic(t, btn) {
  activeTopic = t;
  document.querySelectorAll('.topic-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterWords();
}

function filterWords() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filteredIndices = WORD_DB.reduce((acc, w, i) => {
    const topicOk = !activeTopic || w.topic === activeTopic;
    const searchOk = !q || w.en.toLowerCase().includes(q) || w.zh.includes(q);
    if (topicOk && searchOk) acc.push(i);
    return acc;
  }, []);
  document.getElementById('filterCount').textContent = `找到 ${filteredIndices.length} 個單字`;
  renderWordGrid();
}

// ── Word Grid ────────────────────────────────────────────
function renderWordGrid() {
  const grid = document.getElementById('wordGrid');
  if (filteredIndices.length === 0) {
    grid.innerHTML = '<div class="empty">沒有符合條件的單字</div>';
    return;
  }
  grid.innerHTML = filteredIndices.map(i => {
    const w = WORD_DB[i];
    const sel = selected.has(i);
    return `<label class="word-item ${sel?'selected':''}" onclick="toggleWord(${i}, event)">
      <input type="checkbox" ${sel?'checked':''} onclick="event.stopPropagation();toggleWord(${i})">
      <div>
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
        <div class="word-topic">${w.topic}</div>
      </div>
    </label>`;
  }).join('');
  updateCount();
  renderPreview();
}

function toggleWord(i, e) {
  if (e && e.target.tagName === 'INPUT') return;
  if (selected.has(i)) {
    selected.delete(i);
  } else {
    if (selected.size >= 20) { alert('最多只能選 20 個單字！'); return; }
    selected.add(i);
  }
  renderWordGrid();
}

function updateCount() {
  const badge = document.getElementById('countBadge');
  const n = selected.size;
  badge.textContent = `已選 ${n} / 20`;
  badge.className = 'count-badge' + (n > 20 ? ' over' : '');
}

function randomPick() {
  if (filteredIndices.length < 20) { alert(`目前篩選只有 ${filteredIndices.length} 個單字，需要至少 20 個！`); return; }
  const arr = [...filteredIndices];
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  selected = new Set(arr.slice(0,20));
  renderWordGrid();
}

function clearAll() { selected.clear(); renderWordGrid(); }

function renderPreview() {
  const div = document.getElementById('selectedPreview');
  const words = [...selected].map(i=>WORD_DB[i]);
  if (words.length===0) { div.innerHTML=''; return; }
  div.innerHTML = `<table class="preview-table">
    <thead><tr><th>#</th><th>英文單字</th><th>中文意思</th><th>主題</th></tr></thead>
    <tbody>${words.map((w,j)=>`<tr><td>${j+1}</td><td>${w.en}</td><td>${w.zh}</td><td>${w.topic}</td></tr>`).join('')}</tbody>
  </table>`;
}

function generateLink() {
  if (selected.size !== 20) { alert('請選取恰好 20 個單字！'); return; }
  const words = [...selected].map(i=>WORD_DB[i]).map(w=>({en:w.en,zh:w.zh}));
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(words))));
  const base = window.location.href.replace(/teacher\.html.*$/, '').replace(/\?.*$/, '');
  const url = `${base}student.html?data=${encoded}`;
  document.getElementById('linkBox').textContent = url;
  document.getElementById('linkBox').style.display = 'block';
  document.getElementById('copyRow').style.display = 'flex';
  document.getElementById('copyOk').style.display = 'none';
}

function copyLink() {
  const text = document.getElementById('linkBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const ok = document.getElementById('copyOk');
    ok.style.display = 'inline';
    setTimeout(()=>ok.style.display='none', 2000);
  });
}

// ── Init ─────────────────────────────────────────────────
loadWordDB();
</script>
</body>
</html>
